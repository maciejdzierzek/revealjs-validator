<div class="reveal">
  <div class="slides">
    <section data-transition="fade">
      <h2>Fade</h2>
    </section>
    <section data-transition="slide-in fade-out">
      <h2>Directional</h2>
    </section>
    <section data-transition="zoom" data-transition-speed="fast">
      <h2>Fast zoom</h2>
    </section>
    <section data-background-transition="convex">
      <h2>Background transition</h2>
    </section>
    <section data-transition="none">
      <h2>No transition</h2>
    </section>
  </div>
</div>
